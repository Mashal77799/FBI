<script>
const SITE_PASSWORD = "1234";
const ADMIN_PASSWORD = "r3d";

let currentFile = null;
let isAdmin = false;
let fileCount = 10;

function login(){
  if(document.getElementById('mainPass').value === SITE_PASSWORD){
    loginHide();
    showMain();
  } else alert('خطأ');
}

function openAdmin(){
  loginHide();
  document.getElementById('admin').classList.remove('hidden');
}

function adminLogin(){
  if(document.getElementById('adminPass').value === ADMIN_PASSWORD){
    isAdmin = true;
    document.getElementById('adminPanel').classList.remove('hidden');
    showMain();
  } else alert('خطأ');
}

function loginHide(){
  document.getElementById('login').classList.add('hidden');
}

function showMain(){
  document.getElementById('admin').classList.add('hidden');
  document.getElementById('filePage').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  renderFiles();
}

function renderFiles(){
  const container = document.getElementById('files');
  container.innerHTML = '';

  for(let i=1;i<=fileCount;i++){
    const div = document.createElement('div');
    div.className = 'file';
    div.innerText = 'ملف ' + i;
    div.onclick = () => openFilePage(i);
    container.appendChild(div);
  }
}

function addFile(){
  fileCount++;
  localStorage.setItem('fileCount', fileCount);
  renderFiles();
}

function openFilePage(num){
  currentFile = num;

  document.getElementById('main').classList.add('hidden');
  document.getElementById('filePage').classList.remove('hidden');

  document.getElementById('fileTitle').innerText = 'ملف ' + num;
  document.getElementById('content').classList.add('hidden');
  document.getElementById('content').value = '';
  document.getElementById('filePass').value = '';
}

function openFile(){
  const pass = document.getElementById('filePass').value;
  const saved = localStorage.getItem('pass' + currentFile);

  if(isAdmin){
    loadData();
    return;
  }

  if(!saved){
    localStorage.setItem('pass' + currentFile, pass);
  }

  if(pass === localStorage.getItem('pass' + currentFile)){
    loadData();
  } else {
    alert('خطأ');
  }
}

function loadData(){
  const area = document.getElementById('content');
  area.classList.remove('hidden');
  area.value = localStorage.getItem('data' + currentFile) || '';
}

function saveData(){
  localStorage.setItem(
    'data' + currentFile,
    document.getElementById('content').value
  );
}

function back(){
  document.getElementById('filePage').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
}

window.onload = () => {
  const saved = localStorage.getItem('fileCount');

  if(saved){
    fileCount = parseInt(saved);
  }

  renderFiles();
};
</script>
