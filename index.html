<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FBI Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Tajawal:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#ccc;font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden}
  .page-bg{position:fixed;inset:0;background-image:url('fbi.jpeg');background-size:cover;background-position:center;opacity:0.12;z-index:0;pointer-events:none}
  #loginPage,#welcomePage,#mainPage,#filePage,#fbiPage,#membersPage,#adminPage{position:relative;z-index:1}
  #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{display:flex;flex-direction:column;align-items:center;gap:18px;width:360px;background:rgba(8,8,8,0.88);padding:36px 30px;border:1px solid #222;backdrop-filter:blur(4px)}
  .fbi-title{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#bfbfbf;letter-spacing:8px;line-height:1;user-select:none;text-shadow:0 0 30px rgba(200,200,200,0.08);margin-top:2px}
  .login-form{width:100%;display:flex;flex-direction:column;gap:10px}
  .login-form input{width:100%;background:rgba(20,20,20,0.9);border:1px solid #333;color:#ddd;font-family:'Tajawal',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s;direction:ltr;text-align:left}
  .login-form input:focus{border-color:#777}
  .login-form input::placeholder{color:#555;direction:ltr;text-align:left}
  .login-btn{width:100%;background:rgba(20,20,20,0.9);border:1px solid #444;color:#bbb;font-family:'Tajawal',sans-serif;font-size:14px;letter-spacing:2px;padding:11px;cursor:pointer;transition:all .2s}
  .login-btn:hover{background:rgba(30,30,30,0.9);border-color:#777;color:#eee}
  .login-error{color:#cc4444;font-size:13px;text-align:center;min-height:18px}
  .admin-link{color:#3a3a3a;font-size:12px;cursor:pointer;letter-spacing:2px;transition:color .2s;font-family:'Share Tech Mono',monospace}
  .admin-link:hover{color:#888}
  .fingerprint-wrap{position:relative;cursor:pointer}
  .fingerprint-svg{width:48px;height:48px;opacity:0.4;transition:opacity .3s}
  .fingerprint-wrap:hover .fingerprint-svg{opacity:0.85}
  .fingerprint-tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:rgba(15,15,15,0.95);border:1px solid #333;color:#aaa;font-size:12px;padding:6px 12px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
  .fingerprint-wrap:hover .fingerprint-tooltip{opacity:1}
  .back-btn{position:fixed;top:18px;left:20px;background:rgba(10,10,10,0.9);border:1px solid #333;color:#888;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:8px 16px;cursor:pointer;transition:all .2s;z-index:100;backdrop-filter:blur(4px)}
  .back-btn:hover{border-color:#777;color:#ccc}
  .welcome-nav{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .welcome-nav-btn{background:rgba(15,15,15,0.9);border:1px solid #333;color:#aaa;font-family:'Tajawal',sans-serif;font-size:16px;padding:14px 36px;cursor:pointer;transition:all .2s;letter-spacing:1px;backdrop-filter:blur(4px)}
  .welcome-nav-btn:hover{border-color:#777;color:#eee;background:rgba(25,25,25,0.9)}
  #mainPage{display:none;min-height:100vh;padding:80px 40px 60px}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#999;letter-spacing:8px;text-align:center}
  .title-divider{width:100%;height:1px;background:#252525;margin:14px 0 36px}
  .files-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:860px;margin:0 auto;border:1px solid #222;padding:24px;background:rgba(12,12,12,0.85);backdrop-filter:blur(4px)}
  .file-card{background:rgba(18,18,18,0.9);border:1px solid #2a2a2a;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
  .file-card:hover{border-color:#666;background:rgba(25,25,25,0.9)}
  .file-icon{font-size:20px}
  .file-name{font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .file-lock{font-size:10px;color:#555}
  .files-filter{position:fixed;top:24px;right:22px;display:flex;gap:8px;z-index:50}
  .filter-btn{background:rgba(12,12,12,0.95);border:1px solid #222;color:#aaa;padding:8px 12px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px}
  .filter-btn.active{border-color:#666;color:#eee;background:rgba(25,25,25,0.95)}
  #filePage{display:none;min-height:100vh;padding:80px 40px 60px}
  .file-page-title{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#999;letter-spacing:6px;margin-bottom:14px}
  .file-divider{width:100%;height:1px;background:#252525;margin-bottom:28px}
  .file-content-wrap{max-width:780px;margin:0 auto}
  .file-textarea{width:100%;min-height:400px;background:rgba(14,14,14,0.9);border:1px solid #2a2a2a;color:#ccc;font-family:'Tajawal',sans-serif;font-size:15px;line-height:1.8;padding:22px;resize:vertical;outline:none;transition:border-color .2s}
  .file-textarea[readonly]{background:rgba(18,18,18,0.85);color:#bbb}
  .file-textarea:focus{border-color:#555}
  .file-actions{display:flex;gap:12px;margin-top:14px;justify-content:flex-end;align-items:center}
  .save-btn{background:rgba(16,16,16,0.9);border:1px solid #333;color:#999;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:10px 22px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .save-btn:hover{border-color:#666;color:#ccc}
  .save-status{font-size:12px;color:#666}
  .save-status.saved{color:#44bb77}
  #fbiPage{display:none;min-height:100vh;padding:80px 40px 100px}
  .fbi-page-title{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#999;letter-spacing:12px;text-align:center;margin-bottom:16px}
  .laws-container{max-width:700px;margin:40px auto 0;display:flex;flex-direction:column;gap:10px}
  .law-item{background:rgba(14,14,14,0.9);border:1px solid #252525;border-right:3px solid #555;padding:18px 22px;font-size:15px;color:#bbb;line-height:1.7;backdrop-filter:blur(2px)}
  .law-number{color:#666;font-size:11px;letter-spacing:2px;margin-bottom:6px;font-family:'Share Tech Mono',monospace}
  #membersPage{display:none;min-height:100vh;padding:80px 40px 100px}
  .members-title{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#999;letter-spacing:8px;text-align:center;margin-bottom:16px}
  .members-table{width:100%;max-width:900px;margin:40px auto 0;border-collapse:collapse}
  .members-table th{font-family:'Share Tech Mono',monospace;font-size:11px;color:#777;letter-spacing:3px;text-transform:uppercase;padding:12px 16px;text-align:right;border-bottom:1px solid #252525;background:rgba(10,10,10,0.9)}
  .members-table td{font-size:14px;color:#aaa;padding:12px 16px;border-bottom:1px solid #1a1a1a}
  .members-table tr:hover td{background:rgba(16,16,16,0.9);color:#ccc}
  .rank-badge{background:rgba(16,16,16,0.9);border:1px solid #2a2a2a;color:#999;font-size:12px;padding:3px 10px}
  .news-ticker{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,0.95);border-top:1px solid #1e1e1e;height:38px;display:flex;align-items:center;overflow:hidden;z-index:500}
  .news-label{background:#cc2222;color:#fff;font-size:12px;font-weight:700;padding:0 14px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0}
  .news-scroll-wrap{flex:1;overflow:hidden;position:relative;height:100%;display:flex;align-items:center}
  .news-scroll-text{display:inline-block;white-space:nowrap;font-size:13px;color:#bbb;animation:scrollNews 18s linear infinite;padding-left:100%}
  @keyframes scrollNews{0%{transform:translateX(0)}100%{transform:translateX(-200%)}}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.active{display:flex}
  .modal-box{background:rgba(12,12,12,0.97);border:1px solid #2a2a2a;padding:28px;width:320px;display:flex;flex-direction:column;gap:14px;align-items:center;backdrop-filter:blur(8px)}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#888;letter-spacing:4px}
  .modal-subtitle{font-size:13px;color:#666;text-align:center}
  .modal-input{width:100%;background:rgba(18,18,18,0.95);border:1px solid #333;color:#ccc;font-family:'Tajawal',sans-serif;font-size:15px;padding:10px 12px;outline:none;text-align:center}
  .modal-input:focus{border-color:#666}
  .modal-btns{display:flex;gap:10px;width:100%}
  .modal-btn{flex:1;background:rgba(14,14,14,0.95);border:1px solid #2a2a2a;color:#888;font-family:'Tajawal',sans-serif;font-size:14px;padding:10px;cursor:pointer;transition:all .2s}
  .modal-btn:hover{border-color:#666;color:#ccc}
  .modal-btn.cancel{color:#555}
  .modal-error{color:#cc4444;font-size:13px;min-height:16px}
  #adminPage{display:none;min-height:100vh;padding:80px 40px 100px}
  .admin-header{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#999;letter-spacing:10px;text-align:center}
  .admin-tabs{display:flex;gap:2px;max-width:960px;margin:28px auto 0;border-bottom:1px solid #222;flex-wrap:wrap}
  .admin-tab{background:transparent;border:1px solid transparent;border-bottom:none;color:#555;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:9px 16px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .admin-tab.active{border-color:#333;color:#aaa;background:rgba(14,14,14,0.9)}
  .admin-tab:hover:not(.active){color:#888}
  .admin-panel{display:none;max-width:960px;margin:0 auto;padding-top:26px}
  .admin-panel.active{display:block}
  .section-label{font-size:10px;color:#555;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-family:'Share Tech Mono',monospace}
  .files-list-admin{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .file-row{display:flex;align-items:center;gap:10px;background:rgba(14,14,14,0.9);border:1px solid #222;padding:11px 16px}
  .file-row-name{flex:1}
  .file-row-name input{background:transparent;border:none;color:#aaa;font-family:'Tajawal',sans-serif;font-size:14px;width:100%;outline:none}
  .file-row-name input:focus{color:#eee;border-bottom:1px solid #555}
  .file-row-pin{color:#666;font-size:11px;font-family:'Share Tech Mono',monospace;min-width:90px}
  .file-row-btn{background:transparent;border:1px solid #2a2a2a;color:#777;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 11px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .file-row-btn:hover{border-color:#666;color:#ccc}
  .file-row-btn.danger:hover{border-color:#cc4444;color:#cc4444}
  .add-file-btn{background:rgba(10,10,10,0.9);border:1px dashed #333;color:#666;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:12px;cursor:pointer;transition:all .2s;width:100%;text-transform:uppercase}
  .add-file-btn:hover{border-color:#666;color:#aaa}
  .users-table{width:100%;border-collapse:collapse}
  .users-table th{font-size:10px;color:#666;letter-spacing:2px;text-transform:uppercase;padding:10px 14px;text-align:right;border-bottom:1px solid #222;background:rgba(10,10,10,0.9);font-family:'Share Tech Mono',monospace}
  .users-table td{font-size:13px;color:#999;padding:11px 14px;border-bottom:1px solid #1a1a1a}
  .users-table tr:hover td{background:rgba(16,16,16,0.9);color:#ccc}
  .admin-files-viewer{display:flex;gap:14px}
  .admin-files-sidebar{width:190px;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
  .admin-file-item{background:rgba(14,14,14,0.9);border:1px solid #1e1e1e;padding:9px 13px;font-size:13px;color:#777;cursor:pointer;transition:all .2s}
  .admin-file-item:hover,.admin-file-item.active{border-color:#555;color:#ccc;background:rgba(22,22,22,0.9)}
  .admin-view-file-textarea{width:100%;min-height:360px;background:rgba(14,14,14,0.9);border:1px solid #1e1e1e;color:#ccc;font-family:'Tajawal',sans-serif;font-size:14px;line-height:1.8;padding:18px;resize:vertical;outline:none}
  .admin-view-file-textarea:focus{border-color:#555}
  .law-admin-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
  .law-admin-input{flex:1;background:rgba(14,14,14,0.9);border:1px solid #222;color:#aaa;font-family:'Tajawal',sans-serif;font-size:14px;padding:12px 16px;outline:none;resize:vertical;min-height:50px}
  .law-admin-input:focus{border-color:#555}
  .member-row{display:flex;align-items:center;gap:10px;background:rgba(14,14,14,0.9);border:1px solid #1a1a1a;padding:10px 14px;margin-bottom:6px}
  .member-input{flex:1;background:transparent;border:none;color:#aaa;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;padding:4px 6px;border-bottom:1px solid #2a2a2a;min-width:0}
  .member-input:focus{color:#eee;border-bottom-color:#666}
  .news-admin-input{width:100%;background:rgba(14,14,14,0.9);border:1px solid #1a1a1a;color:#aaa;font-family:'Tajawal',sans-serif;font-size:14px;padding:14px 18px;outline:none;margin-bottom:12px}
  .news-admin-input:focus{border-color:#555}
  .notif{position:fixed;bottom:50px;right:22px;background:rgba(14,14,14,0.95);border:1px solid #2a2a2a;color:#aaa;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:11px 18px;z-index:9999;transform:translateY(80px);transition:transform .3s;pointer-events:none}
  .notif.show{transform:translateY(0)}
  .notif.green{border-color:#1a3a28;color:#44bb77}
  .notif.red{border-color:#3a1a1a;color:#cc4444}
  .loading-overlay{position:fixed;inset:0;background:#080808;display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:20px}
  .loading-text{font-family:'Share Tech Mono',monospace;font-size:12px;color:#555;letter-spacing:3px;animation:blink 1.2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  /* small responsive
