<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>FBI</title>
<style>
body {
    background:black;
    color:gray;
    font-family:Arial;
    text-align:center;
}
h1 {
    font-size:50px;
}
.container {
    margin-top:100px;
}
input, textarea {
    padding:10px;
    margin:5px;
    width:250px;
}
button {
    padding:10px 20px;
    margin:5px;
}
.file {
    border:1px solid gray;
    padding:10px;
    margin:5px;
}
.top {
    position:absolute;
    right:20px;
    top:20px;
}
</style>
</head>

<body>

<div id="login" class="container">
    <h1>FBI</h1>
    <input id="name" placeholder="اسمك"><br>
    <input id="pass" type="password" placeholder="كلمة السر"><br>
    <button onclick="login()">دخول</button><br>
    <small onclick="leaderLogin()">القيادات</small>
</div>

<div id="main" style="display:none;">
    <div class="top">
        <button onclick="logout()">رجوع</button>
    </div>

    <h2 id="welcome"></h2>

    <div id="files"></div>

    <textarea id="editor" rows="10" cols="50"></textarea><br>
    <button onclick="saveFile()">حفظ</button>

    <div id="leaderPanel" style="display:none;">
        <h3>لوحة القيادات</h3>
        <button onclick="addFile()">إضافة ملف</button>
        <button onclick="viewUsers()">عرض المستخدمين</button>
    </div>

    <div id="usersList"></div>
</div>

<script>
let currentUser = "";
let isLeader = false;
let currentFile = null;

function login() {
    let name = document.getElementById("name").value;
    let pass = document.getElementById("pass").value;

    if(pass !== "soso") return alert("كلمة السر غلط");

    currentUser = name;
    saveUser(name);

    start();
}

function leaderLogin(){
    let pass = prompt("ادخل كلمة القيادات");
    if(pass === "r3d"){
        isLeader = true;
        currentUser = "قيادة";
        start();
    } else {
        alert("خطأ");
    }
}

function start(){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("welcome").innerText = "👆 مرحبا " + currentUser;

    if(isLeader){
        document.getElementById("leaderPanel").style.display="block";
    }

    loadFiles();
}

function logout(){
    location.reload();
}

function saveUser(name){
    let users = JSON.parse(localStorage.getItem("users")||"[]");
    users.push({name:name,date:new Date().toLocaleString()});
    localStorage.setItem("users", JSON.stringify(users));
}

function viewUsers(){
    let users = JSON.parse(localStorage.getItem("users")||"[]");
    let html="";
    users.forEach(u=>{
        html+= `<div>${u.name} - ${u.date}</div>`;
    });
    document.getElementById("usersList").innerHTML = html;
}

function loadFiles(){
    let files = JSON.parse(localStorage.getItem("files")||"[]");
    let html="";

    files.forEach((f,i)=>{
        html+= `<div class="file">
        <span onclick="openFile(${i})">${f.name}</span>
        ${isLeader ? `<button onclick="deleteFile(${i})">حذف</button>`:""}
        </div>`;
    });

    document.getElementById("files").innerHTML = html;
}

function addFile(){
    let files = JSON.parse(localStorage.getItem("files")||"[]");
    let name = "ملف " + (files.length+1);
    files.push({name:name,content:""});
    localStorage.setItem("files", JSON.stringify(files));
    loadFiles();
}

function deleteFile(i){
    let files = JSON.parse(localStorage.getItem("files"));
    files.splice(i,1);
    localStorage.setItem("files", JSON.stringify(files));
    loadFiles();
}

function openFile(i){
    let files = JSON.parse(localStorage.getItem("files"));
    currentFile = i;
    document.getElementById("editor").value = files[i].content;
}

function saveFile(){
    let files = JSON.parse(localStorage.getItem("files"));
    files[currentFile].content = document.getElementById("editor").value;
    localStorage.setItem("files", JSON.stringify(files));
    alert("تم الحفظ");
}
</script>

</body>
</html>
