<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الوكيل السري</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:#000;color:#fff}

/* الشاشات */
.screen{display:none;width:100vw;height:100vh;justify-content:center;align-items:center}
.active-screen{display:flex}
.hidden{display:none}

/* صندوق */
.center-box{border:2px solid #fff;padding:30px;width:400px;text-align:center}

/* عناصر */
input,select,textarea{
width:100%;padding:8px;margin:8px 0;background:#000;border:1px solid #fff;color:#fff
}
button{padding:8px 15px;background:#fff;color:#000;border:none;cursor:pointer}
button:hover{background:#ccc}

.top-bar{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #fff}
.main{display:flex;height:calc(100vh - 50px)}
.sidebar{width:200px;border-left:1px solid #fff}
.sidebar li{padding:10px;border-bottom:1px solid #222;cursor:pointer}
.sidebar li:hover{background:#111}
.active{background:#fff;color:#000}

.content{flex:1;padding:10px}
.panel{display:none}
.active-panel{display:block}

.box{border:1px solid #fff;padding:10px;margin:5px}
.data-table{width:100%;border-collapse:collapse}
.data-table td,.data-table th{border:1px solid #fff;padding:5px;text-align:center}

/* كاميرات */
.camera-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.camera-box{border:1px solid #fff;height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* خريطة */
.fake-map{display:grid;grid-template-columns:repeat(10,1fr);gap:2px}
.map-cell{height:40px;border:1px solid #222;cursor:pointer}
.map-point{width:6px;height:6px;background:#fff;border-radius:50%;margin:auto;margin-top:15px}

/* رسائل */
.messages-list{height:250px;overflow:auto;border:1px solid #fff;padding:5px}
.message-item{border-bottom:1px solid #222;padding:4px}

</style>
</head>

<body>

<!-- تسجيل دخول -->
<div id="login-screen" class="screen active-screen">
<div class="center-box">
<h2>تسجيل دخول</h2>
<input id="username" placeholder="اسم المستخدم">
<input id="password" type="password" placeholder="كلمة المرور">
<button id="login-btn">دخول</button>
<div id="login-message"></div>
</div>
</div>

<!-- لوحة التحكم -->
<div id="dashboard-screen" class="screen hidden">

<div class="top-bar">
<div>NSS SYSTEM</div>
<div id="timer">00:00</div>
</div>

<div class="main">

<!-- القائمة -->
<ul class="sidebar">
<li class="nav active" data-target="files">الملفات</li>
<li class="nav" data-target="cams">الكاميرات</li>
<li class="nav" data-target="map">الخريطة</li>
<li class="nav" data-target="messages">الرسائل</li>
<li class="nav" data-target="logs">السجل</li>
</ul>

<!-- المحتوى -->
<div class="content">

<!-- الملفات -->
<div id="files" class="panel active-panel">
<h3>الملفات</h3>

<table class="data-table">
<thead>
<tr><th>#</th><th>اسم</th><th>تصنيف</th></tr>
</thead>
<tbody id="files-body"></tbody>
</table>

<input id="file-name" placeholder="اسم الملف">
<select id="file-level">
<option>سري</option>
<option>سري جدا</option>
</select>
<button id="add-file">إضافة</button>
</div>

<!-- الكاميرات -->
<div id="cams" class="panel">
<h3>الكاميرات</h3>
<div class="camera-grid" id="cams-grid"></div>
<div id="cam-details"></div>
</div>

<!-- الخريطة -->
<div id="map" class="panel">
<h3>الخريطة</h3>
<div class="fake-map" id="map-grid"></div>
<div id="map-info"></div>
</div>

<!-- الرسائل -->
<div id="messages" class="panel">
<h3>الرسائل</h3>
<div class="messages-list" id="messages-list"></div>
<textarea id="msg-input"></textarea>
<button id="send-msg">إرسال</button>
</div>

<!-- السجل -->
<div id="logs" class="panel">
<h3>السجل</h3>
<div id="logs-box"></div>
</div>

</div>
</div>
</div>

<script>

/* تسجيل الدخول */
document.getElementById("login-btn").onclick = ()=>{
let u = username.value
let p = password.value

if(u==="agent" && p==="1234"){
login-screen.classList.add("hidden")
dashboard-screen.classList.remove("hidden")
init()
}else{
login-message.innerText="خطأ"
}
}

/* التنقل */
document.querySelectorAll(".nav").forEach(n=>{
n.onclick=()=>{
document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"))
n.classList.add("active")

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active-panel"))
document.getElementById(n.dataset.target).classList.add("active-panel")
}
})

/* بيانات */
let files=[]
let logs=[]
let messages=[]

/* تشغيل */
function init(){
renderFiles()
renderCams()
renderMap()
startTimer()
}

/* ملفات */
add-file.onclick=()=>{
if(file-name.value=="")return
files.push({name:file-name.value,level:file-level.value})
renderFiles()
log("تم إضافة ملف")
file-name.value=""
}

function renderFiles(){
files-body.innerHTML=""
files.forEach((f,i)=>{
files-body.innerHTML+=`<tr><td>${i+1}</td><td>${f.name}</td><td>${f.level}</td></tr>`
})
}

/* كاميرات */
function renderCams(){
for(let i=1;i<=4;i++){
let div=document.createElement("div")
div.className="camera-box"
div.innerText="كاميرا "+i
div.onclick=()=>cam-details.innerText="تفاصيل الكاميرا "+i
cams-grid.appendChild(div)
}
}

/* خريطة */
function renderMap(){
for(let i=0;i<60;i++){
let cell=document.createElement("div")
cell.className="map-cell"

if(Math.random()>0.8){
let p=document.createElement("div")
p.className="map-point"
cell.appendChild(p)
cell.onclick=()=>map-info.innerText="موقع مشبوه"
}

map-grid.appendChild(cell)
}
}

/* رسائل */
send-msg.onclick=()=>{
if(msg-input.value=="")return
messages.push(msg-input.value)
renderMessages()
log("تم إرسال رسالة")
msg-input.value=""
}

function renderMessages(){
messages-list.innerHTML=""
messages.forEach(m=>{
messages-list.innerHTML+=`<div class="message-item">${m}</div>`
})
}

/* سجل */
function log(t){
logs.push(t)
logs-box.innerHTML=logs.join("<br>")
}

/* مؤقت */
function startTimer(){
let s=0
setInterval(()=>{
s++
let m=Math.floor(s/60)
let sec=s%60
timer.innerText=`${m}:${sec<10?"0":""}${sec}`
},1000)
}

</script>

</body>
</html>
