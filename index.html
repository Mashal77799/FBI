<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Panel FBI</title><style>
body{margin:0;font-family:Arial;background:black;color:gray}
#back{position:fixed;top:10px;right:10px;padding:8px 12px;border:1px solid gray;background:#111;cursor:pointer;display:none}
#login{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
input{margin:5px;padding:10px;background:#111;border:1px solid gray;color:white}
button{padding:10px;background:#222;border:1px solid gray;color:gray;cursor:pointer}
.files{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:90%;margin:60px auto}
.file{border:1px solid gray;padding:20px;text-align:center;cursor:pointer;transition:.3s}
.file:hover{background:#222;transform:scale(1.05)}
#editor{display:none;width:80%;margin:auto}
textarea{width:100%;height:300px;background:#111;color:white;border:1px solid gray}
#fingerprint-box{text-align:center;margin-top:40px}
#fingerprint{width:120px;height:120px;margin:auto;border-radius:20px;background:#0f172a;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s}
#fingerprint:hover{transform:scale(1.1)}
#welcome-text{margin-top:15px;color:white;font-size:18px}
</style></head><body>
<button id="back" onclick="logout()">تسجيل خروج</button><!-- LOGIN --><div id="login">
<h2>LOGIN</h2>
<input id="user" placeholder="Name">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Enter</button>
<p onclick="adminLogin()" style="cursor:pointer;font-size:12px">Admin</p>
</div><!-- APP --><div id="app" style="display:none;"><div id="fingerprint-box">
<div id="fingerprint">
<img src="https://cdn-icons-png.flaticon.com/512/709/709722.png" width="60">
</div>
<p id="welcome-text"></p>
</div><div class="files" id="files"></div><div id="editor">
<h3 id="title"></h3>
<textarea id="text"></textarea><br><br>
<button onclick="save()">حفظ</button>
<button onclick="deleteFile()" style="margin-top:10px;background:#400">حذف الملف</button>
</div></div><script>
let currentUser=null;
let currentFile=null;
let isAdmin=false;

// USERS SYSTEM
let users=JSON.parse(localStorage.getItem("users")||"{}");
function hash(str){return btoa(str).substring(0,10)}
const adminHash="cjNk"; // r3d

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!u||!p) return alert("اكتب البيانات");

if(!users[u]){
users[u]=hash(p);
localStorage.setItem("users",JSON.stringify(users));
}else{
if(users[u]!==hash(p)) return alert("كلمة المرور غلط");
}

currentUser=u;
localStorage.setItem("username", u);

let logs=JSON.parse(localStorage.getItem("logs")||"[]");
logs.push({user:u,time:new Date().toLocaleString()});
localStorage.setItem("logs",JSON.stringify(logs));

start();
}

function adminLogin(){
let p=prompt("Admin Password");
if(hash(p)===adminHash){
isAdmin=true;
currentUser="ADMIN";
localStorage.setItem("username","ADMIN");
start();
}else alert("خطأ");
}

function start(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("back").style.display="block";
setupFingerprint();
loadFiles();
render();
}

// بصمة
function setupFingerprint(){
let username = localStorage.getItem("username") || "User";
const fingerprint = document.getElementById("fingerprint");
const text = document.getElementById("welcome-text");

fingerprint.addEventListener("mouseenter",()=>{
text.innerText = "مرحباً " + username + " 👋";
});

fingerprint.addEventListener("click",()=>{
text.innerText = "تم التحقق من الهوية 🔒";
});
}

function logout(){location.reload()}

// FILES PER USER
function loadFiles(){
window.files=JSON.parse(localStorage.getItem("files_"+currentUser)||"[]");
}

function saveFiles(){
localStorage.setItem("files_"+currentUser,JSON.stringify(files));
}

function render(){
let box=document.getElementById("files");
box.innerHTML="";

files.forEach((f,i)=>{
let d=document.createElement("div");
d.className="file";
d.innerText=f.name;
d.onclick=()=>openFile(i);
box.appendChild(d);
});

if(isAdmin){
let add=document.createElement("div");
add.className="file";
add.innerText="+ Add File";
add.onclick=addFile;
box.appendChild(add);
}
}

function openFile(i){
currentFile=i;
document.getElementById("editor").style.display="block";
document.getElementById("title").innerText=files[i].name;
document.getElementById("text").value=files[i].text||"";
}

function save(){
files[currentFile].text=document.getElementById("text").value;
saveFiles();
alert("تم الحفظ");
}

// حذف ملف
function deleteFile(){
if(currentFile===null) return;
if(confirm("متأكد تحذف الملف؟")){
files.splice(currentFile,1);
saveFiles();
render();
document.getElementById("editor").style.display="none";
}
}

function addFile(){
let name="File "+(files.length+1);
files.push({name:name,text:""});
saveFiles();
render();
}

</script></body>
</html>
