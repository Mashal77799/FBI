<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:gray;
}

/* login */
#loginBox{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.title{
    font-size:40px;
    letter-spacing:5px;
    margin-bottom:20px;
}

input{
    padding:10px;
    width:200px;
    margin:5px;
    background:#111;
    border:1px solid gray;
    color:white;
}

button{
    padding:10px;
    background:#222;
    color:gray;
    border:1px solid gray;
    cursor:pointer;
}

/* main */
#app{
    display:none;
}

.header{
    text-align:center;
    font-size:28px;
    margin-top:20px;
    border-bottom:1px solid gray;
    padding-bottom:10px;
    width:80%;
    margin-left:auto;
    margin-right:auto;
}

.files{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    width:90%;
    margin:30px auto;
}

.file{
    border:1px solid gray;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

.editor{
    display:none;
    width:80%;
    margin:20px auto;
}

textarea{
    width:100%;
    height:200px;
    background:#111;
    color:white;
    border:1px solid gray;
    font-size:16px;
}

.adminPanel{
    display:none;
    width:80%;
    margin:20px auto;
    border:1px solid gray;
    padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="title">SECURE</div>

    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>

    <p style="font-size:12px;cursor:pointer" onclick="adminLogin()">القيادات</p>
</div>

<!-- APP -->
<div id="app">

    <div class="header">Dashboard</div>

    <div class="files" id="files"></div>

    <div class="editor" id="editor">
        <h3 id="fileTitle"></h3>
        <textarea id="text"></textarea>
        <button onclick="saveFile()">حفظ</button>
    </div>

    <div class="adminPanel" id="admin">
        <h3>Admin Panel</h3>
        <button onclick="addFile()">إضافة ملف</button>
        <button onclick="deleteFile()">حذف آخر ملف</button>
    </div>

</div>

<script>
let masterPassword = "1234";
let adminPassword = "r3d";
let currentFile = null;

let data = JSON.parse(localStorage.getItem("files") || "[]");

function login(){
    let p = document.getElementById("pass").value;
    if(p === masterPassword){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        renderFiles();
    }else{
        alert("خطأ في كلمة المرور");
    }
}

function adminLogin(){
    let p = prompt("ادخل كلمة سر القيادات");
    if(p === adminPassword){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("admin").style.display="block";
        renderFiles();
    }
}

function renderFiles(){
    let box = document.getElementById("files");
    box.innerHTML="";
    data.forEach((f,i)=>{
        let div=document.createElement("div");
        div.className="file";
        div.innerText="File "+(i+1);
        div.onclick=()=>openFile(i);
        box.appendChild(div);
    });
}

function openFile(i){
    currentFile=i;
    document.getElementById("editor").style.display="block";
    document.getElementById("fileTitle").innerText="File "+(i+1);
    document.getElementById("text").value=data[i] || "";
}

function saveFile(){
    data[currentFile]=document.getElementById("text").value;
    localStorage.setItem("files",JSON.stringify(data));
    alert("تم الحفظ");
}

function addFile(){
    data.push("");
    renderFiles();
}

function deleteFile(){
    data.pop();
    renderFiles();
}
</script>

</body>
</html>
