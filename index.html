<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:gray;
}

/* BACK */
#back{
    position:fixed;
    top:10px;
    right:10px;
    padding:8px 12px;
    border:1px solid gray;
    background:#111;
    cursor:pointer;
    display:none;
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input{
    margin:5px;
    padding:10px;
    background:#111;
    border:1px solid gray;
    color:white;
}

button{
    padding:10px;
    background:#222;
    border:1px solid gray;
    color:gray;
    cursor:pointer;
}

/* FILES */
.files{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    width:90%;
    margin:60px auto;
}

.file{
    border:1px solid gray;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

/* EDITOR */
#editor{
    display:none;
    width:80%;
    margin:auto;
}

textarea{
    width:100%;
    height:300px;
    background:#111;
    color:white;
    border:1px solid gray;
}
</style>
</head>

<body>

<button id="back" onclick="back()">رجوع</button>

<!-- LOGIN -->
<div id="login">
    <h2>LOGIN</h2>
    <input id="user" placeholder="Name">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
    <p onclick="adminLogin()" style="cursor:pointer;font-size:12px">Admin</p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="files" id="files"></div>

<div id="editor">
    <h3 id="title"></h3>
    <textarea id="text"></textarea><br><br>
    <button onclick="save()">حفظ</button>
</div>

</div>

<script>

let currentUser=null;
let currentFile=null;
let isAdmin=false;

/* EMPTY FILES (ADMIN CREATES) */
let files=JSON.parse(localStorage.getItem("files")||"[]");

/* LOGIN */
function login(){
    let u=document.getElementById("user").value;

    if(!u) return;

    currentUser=u;

    let logs=JSON.parse(localStorage.getItem("logs")||"[]");
    logs.push({user:u,time:new Date().toLocaleString()});
    localStorage.setItem("logs",JSON.stringify(logs));

    start();
}

/* ADMIN */
function adminLogin(){
    let p=prompt("Admin Password");
    if(p==="r3d"){
        isAdmin=true;
        start();
    }
}

/* START */
function start(){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("back").style.display="block";

    render();
}

/* BACK */
function back(){
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
    document.getElementById("back").style.display="none";
}

/* RENDER */
function render(){
    let box=document.getElementById("files");
    box.innerHTML="";

    files.forEach((f,i)=>{
        let d=document.createElement("div");
        d.className="file";
        d.innerText=f.name;
        d.onclick=()=>open(i);
        box.appendChild(d);
    });

    if(isAdmin){
        let add=document.createElement("div");
        add.className="file";
        add.innerText="+ Add File";
        add.onclick=addFile;
        box.appendChild(add);
    }
}

/* OPEN FILE */
function open(i){
    currentFile=i;
    document.getElementById("editor").style.display="block";
    document.getElementById("title").innerText=files[i].name;
    document.getElementById("text").value=files[i].text||"";
}

/* SAVE */
function save(){
    files[currentFile].text=document.getElementById("text").value;
    localStorage.setItem("files",JSON.stringify(files));
}

/* ADD FILE */
function addFile(){
    let name="File "+(files.length+1);
    files.push({name:name,text:""});
    localStorage.setItem("files",JSON.stringify(files));
    render();
}

</script>

</body>
</html>
