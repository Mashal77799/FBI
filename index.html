<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBI Federal System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:#00ffcc;
}

/* خلفية */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d') no-repeat center/cover;
    opacity:0.15;
}

/* تسجيل */
#login{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:30px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 25px #00ffcc;
}

input{
    padding:10px;
    margin:5px;
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
}

button{
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    margin:5px;
}

/* لوحة */
#panel{
    display:none;
    padding:20px;
}

.nav{
    background:#111;
    padding:10px;
}

/* كروت */
.card{
    background:#111;
    padding:10px;
    margin:10px 0;
}

/* تنبيه */
.alert{color:red;}

/* شاشة */
.screen{
    background:black;
    border:1px solid #00ffcc;
    padding:10px;
    height:200px;
    overflow:auto;
}
</style>
</head>

<body>

<!-- تسجيل -->
<div id="login">
    <h2>FEDERAL ACCESS</h2>
    <input id="user" placeholder="Username"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">LOGIN</button>

    <div onclick="fingerprint()" style="margin-top:10px;cursor:pointer;">
        👆 Scan Fingerprint
    </div>
</div>

<!-- لوحة -->
<div id="panel">

<div class="nav">
<button onclick="tab('dash')">Dashboard</button>
<button onclick="tab('cases')">Cases</button>
<button onclick="tab('agents')">Agents</button>
<button onclick="tab('alerts')">Alerts</button>
<button onclick="tab('monitor')">Monitor</button>
<button onclick="logout()">Logout</button>
</div>

<div id="clock"></div>

<!-- داش -->
<div id="dash">
<div class="card">👤 Agent: Abu3zh</div>
<div class="card">🔐 Rank: Commander</div>
<div class="card">📡 Status: ACTIVE</div>
</div>

<!-- قضايا -->
<div id="cases" style="display:none;">
<input id="caseInput" placeholder="Add Case">
<button onclick="addCase()">Add</button>
<input id="search" placeholder="Search" onkeyup="searchCase()">

<div id="caseList"></div>
</div>

<!-- عملاء -->
<div id="agents" style="display:none;">
<input id="agentInput" placeholder="Add Agent">
<button onclick="addAgent()">Add</button>
<div id="agentList"></div>
</div>

<!-- تنبيهات -->
<div id="alerts" style="display:none;">
<div class="alert">⚠ محاولة اختراق</div>
<div class="alert">⚠ نشاط مشبوه</div>
</div>

<!-- مراقبة -->
<div id="monitor" style="display:none;">
<div class="screen" id="log"></div>
</div>

</div>

<script>
let cases = JSON.parse(localStorage.getItem("cases")) || [];
let agents = JSON.parse(localStorage.getItem("agents")) || [];

/* تسجيل */
function login(){
    if(user.value=="admin" && pass.value=="1234"){
        start("مرحباً يا معالي القائد");
    }else{
        alert("ACCESS DENIED");
    }
}

function fingerprint(){
    start("تم التعرف على البصمة");
}

function start(msg){
    alert(msg);
    login.style.display="none";
    panel.style.display="block";
    sound();
    updateClock();
    render();
}

/* صوت */
function sound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
    audio.play();
}

/* وقت */
function updateClock(){
    setInterval(()=>{
        clock.innerText="🕒 "+new Date().toLocaleTimeString();
    },1000);
}

/* تنقل */
function tab(t){
    ["dash","cases","agents","alerts","monitor"].forEach(x=>{
        document.getElementById(x).style.display="none";
    });
    document.getElementById(t).style.display="block";
}

/* قضايا */
function addCase(){
    cases.push(caseInput.value);
    localStorage.setItem("cases",JSON.stringify(cases));
    render();
}

function render(){
    caseList.innerHTML="";
    cases.forEach((c,i)=>{
        caseList.innerHTML+=`<div class="card">${c} <button onclick="delCase(${i})">X</button></div>`;
    });

    agentList.innerHTML="";
    agents.forEach((a,i)=>{
        agentList.innerHTML+=`<div class="card">${a} <button onclick="delAgent(${i})">X</button></div>`;
    });
}

function delCase(i){
    cases.splice(i,1);
    localStorage.setItem("cases",JSON.stringify(cases));
    render();
}

/* بحث */
function searchCase(){
    let val = search.value.toLowerCase();
    caseList.innerHTML="";
    cases.filter(c=>c.toLowerCase().includes(val))
    .forEach(c=>{
        caseList.innerHTML+=`<div class="card">${c}</div>`;
    });
}

/* عملاء */
function addAgent(){
    agents.push(agentInput.value);
    localStorage.setItem("agents",JSON.stringify(agents));
    render();
}

function delAgent(i){
    agents.splice(i,1);
    localStorage.setItem("agents",JSON.stringify(agents));
    render();
}

/* مراقبة */
setInterval(()=>{
    if(document.getElementById("log")){
        log.innerHTML+="📡 اتصال جديد<br>";
        log.scrollTop=log.scrollHeight;
    }
},3000);

function logout(){location.reload();}
</script>

</body>
</html>
