<script>
// ── STORAGE ──────────────────────────────────────────────────
const STORE_KEY = 'fbi_v2';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultData(); }
  catch(e) { return defaultData(); }
}

function saveData(d) {
  localStorage.setItem(STORE_KEY, JSON.stringify(d));
}

function defaultData() {
  return { files: [], logins: [], nextFileId: 1 };
}

// ── FINGERPRINT ───────────────────────────────────────────────
document.getElementById('fpWrap').addEventListener('mouseenter', () => {
  const name = localStorage.getItem('fbi_last_user');
  document.getElementById('fpTooltip').textContent =
    name ? `مرحبا، ${name}` : '— مجهول —';
});

// ── CONSTANTS ─────────────────────────────────────────────────
const MAIN_PASS  = 'soso';
const ADMIN_PASS = 'r3d';

let currentUser        = null;
let currentFileIndex   = null;
let adminSelFileIndex  = null;
let pendingFileIndex   = null;

// ── LOGIN ─────────────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');

  if (!name) { err.textContent = 'أدخل اسمك'; return; }
  if (pass !== MAIN_PASS) { err.textContent = 'كلمة المرور خاطئة'; return; }

  err.textContent = '';
  currentUser = name;

  // سجل الدخول
  const d   = loadData();
  const now = new Date();
  d.logins.push({
    name : name,
    pass : pass,
    date : now.toLocaleDateString('ar-SA'),
    time : now.toLocaleTimeString('ar-SA')
  });
  saveData(d);

  localStorage.setItem('fbi_last_user', name);
  showMain();
}

function logout() {
  currentUser = null;
  showPage('loginPage');
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

function adminLogout() {
  showPage('loginPage');
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

// ── ADMIN LOGIN ───────────────────────────────────────────────
function showAdminLogin() {
  document.getElementById('adminPinInput').value  = '';
  document.getElementById('adminPinError').textContent = '';
  document.getElementById('adminLoginModal').classList.add('active');
}

function closeAdminLogin() {
  document.getElementById('adminLoginModal').classList.remove('active');
}

function confirmAdminPin() {
  const pin = document.getElementById('adminPinInput').value;
  if (pin === ADMIN_PASS) { closeAdminLogin(); showAdminPage(); }
  else { document.getElementById('adminPinError').textContent = 'الرمز خاطئ'; }
}

document.getElementById('adminPinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAdminPin();
});

// ── PAGES ─────────────────────────────────────────────────────
function showPage(id) {
  ['loginPage','mainPage','filePage','adminPage'].forEach(p => {
    const el = document.getElementById(p);
    el.style.display = 'none';
  });
  const target = document.getElementById(id);
  target.style.display = id === 'loginPage' ? 'flex' : 'block';
}

function showMain()      { renderFilesGrid(); showPage('mainPage'); }
function backToMain()    { renderFilesGrid(); showPage('mainPage'); }

function showAdminPage() {
  renderAdminFiles();
  renderAdminSidebar();
  renderUsersTable();
  showPage('adminPage');
  switchTab('files');
}

// ── FILES GRID ────────────────────────────────────────────────
function renderFilesGrid() {
  const d    = loadData();
  const grid = document.getElementById('filesGrid');
  grid.innerHTML = '';

  if (!d.files.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#444;font-size:11px;letter-spacing:2px;padding:40px;">لا توجد ملفات</div>';
    return;
  }

  d.files.forEach((file, i) => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `
      <div class="file-icon">🗂</div>
      <div class="file-name">${escHtml(file.name)}</div>
      <div class="file-lock">🔒</div>`;
    card.onclick = () => openFileWithPin(i);
    grid.appendChild(card);
  });
}

// ── PIN MODAL (user) ──────────────────────────────────────────
function openFileWithPin(index) {
  pendingFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('pinModalSub').textContent = `رمز: ${escHtml(file.name)}`;
  document.getElementById('pinInput').value           = '';
  document.getElementById('pinError').textContent     = '';
  document.getElementById('pinModal').classList.add('active');
}

function closePinModal() {
  document.getElementById('pinModal').classList.remove('active');
  pendingFileIndex = null;
}

function confirmPin() {
  const pin  = document.getElementById('pinInput').value;
  const file = loadData().files[pendingFileIndex];
  if (pin === file.pin) { closePinModal(); openFile(pendingFileIndex); }
  else { document.getElementById('pinError').textContent = 'الرمز خاطئ'; }
}

document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmPin();
});

// ── FILE PAGE ─────────────────────────────────────────────────
function openFile(index) {
  currentFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('filePageTitle').textContent  = file.name;
  document.getElementById('fileTextarea').value         = file.content || '';
  document.getElementById('saveStatus').textContent     = '';
  document.getElementById('saveStatus').className       = 'save-status';
  showPage('filePage');
}

function saveCurrentFile() {
  if (currentFileIndex === null) return;
  const d = loadData();
  d.files[currentFileIndex].content = document.getElementById('fileTextarea').value;
  saveData(d);
  setSaveStatus('✓ تم الحفظ', true);
  showNotif('تم الحفظ', 'green');
  setTimeout(() => setSaveStatus('', false), 2200);
}

document.getElementById('fileTextarea').addEventListener('input', () => {
  if (currentFileIndex === null) return;
  const d = loadData();
  d.files[currentFileIndex].content = document.getElementById('fileTextarea').value;
  saveData(d);
  setSaveStatus('↺ حفظ تلقائي...', false);
});

function setSaveStatus(msg, ok) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className   = ok ? 'save-status saved' : 'save-status';
}

// ── NEW FILE MODAL (admin) ────────────────────────────────────
function addFile() {
  document.getElementById('newFileName').value        = '';
  document.getElementById('newFilePin').value         = '';
  document.getElementById('newFileError').textContent = '';
  document.getElementById('newFileModal').classList.add('active');
}

function closeNewFileModal() {
  document.getElementById('newFileModal').classList.remove('active');
}

function confirmNewFile() {
  const name = document.getElementById('newFileName').value.trim();
  const pin  = document.getElementById('newFilePin').value.trim();
  const err  = document.getElementById('newFileError');

  if (!name) { err.textContent = 'أدخل اسم الملف'; return; }
  if (!pin)  { err.textContent = 'أدخل الرمز السري'; return; }

  const d   = loadData();
  const num = d.nextFileId++;
  d.files.push({ id: num, name: name, pin: pin, content: '' });
  saveData(d);
  closeNewFileModal();
  renderAdminFiles();
  renderAdminSidebar();
  showNotif(`تم إضافة: ${name}`, 'green');
}

document.getElementById('newFilePin').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmNewFile();
});

// ── ADMIN: MANAGE FILES ───────────────────────────────────────
function renderAdminFiles() {
  const d    = loadData();
  const list = document.getElementById('adminFilesList');
  list.innerHTML = '';

  d.files.forEach((file, i) => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.innerHTML = `
      <div class="file-row-name">
        <input type="text" value="${escHtml(file.name)}"
          onchange="renameFile(${i}, this.value)" placeholder="اسم الملف"/>
      </div>
      <div class="file-row-pin">رمز: ${escHtml(file.pin)}</div>
      <button class="file-row-btn" onclick="changePin(${i})">تغيير الرمز</button>
      <button class="file-row-btn danger" onclick="deleteFile(${i})">حذف</button>`;
    list.appendChild(row);
  });
}

function deleteFile(index) {
  if (!confirm('هل تريد حذف هذا الملف؟')) return;
  const d = loadData();
  d.files.splice(index, 1);
  saveData(d);
  renderAdminFiles();
  renderAdminSidebar();
  adminSelFileIndex = null;
  document.getElementById('adminViewTextarea').value  = '';
  document.getElementById('adminViewFileName').textContent = '';
  showNotif('تم الحذف', 'red');
}

function renameFile(index, newName) {
  if (!newName.trim()) return;
  const d = loadData();
  d.files[index].name = newName.trim();
  saveData(d);
  renderAdminSidebar();
}

function changePin(index) {
  const d      = loadData();
  const newPin = prompt(`رمز جديد للملف "${d.files[index].name}":`, d.files[index].pin);
  if (newPin === null) return;
  if (!newPin.trim()) { showNotif('الرمز لا يمكن أن يكون فارغاً', 'red'); return; }
  d.files[index].pin = newPin.trim();
  saveData(d);
  renderAdminFiles();
  showNotif('تم تغيير الرمز', 'green');
}

// ── ADMIN: VIEW FILES ─────────────────────────────────────────
function renderAdminSidebar() {
  const d  = loadData();
  const sb = document.getElementById('adminFilesSidebar');
  sb.innerHTML = '';
  d.files.forEach((file, i) => {
    const item = document.createElement('div');
    item.className = 'admin-file-item' + (adminSelFileIndex === i ? ' active' : '');
    item.textContent = file.name;
    item.onclick = () => adminSelectFile(i);
    sb.appendChild(item);
  });
}

function adminSelectFile(index) {
  adminSelFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('adminViewFileName').textContent = file.name;
  document.getElementById('adminViewTextarea').value       = file.content || '';
  renderAdminSidebar();
}

function adminSaveFile() {
  if (adminSelFileIndex === null) { showNotif('اختر ملفاً أولاً', 'red'); return; }
  const d = loadData();
  d.files[adminSelFileIndex].content = document.getElementById('adminViewTextarea').value;
  saveData(d);
  showNotif('تم الحفظ', 'green');
}

// ── ADMIN: USERS TABLE ────────────────────────────────────────
function renderUsersTable() {
  const d     = loadData();
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = '';

  if (!d.logins.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#444;padding:24px;letter-spacing:1px;">لا يوجد سجلات</td></tr>';
    return;
  }

  [...d.logins].reverse().forEach(log => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escHtml(log.name)}</td>
      <td>${escHtml(log.pass)}</td>
      <td>${escHtml(log.date)}</td>
      <td>${escHtml(log.time)}</td>`;
    tbody.appendChild(tr);
  });
}

// ── ADMIN TABS ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t   => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  const map = { files:'tabFiles', view:'tabView', users:'tabUsers' };
  document.getElementById(map[tab]).classList.add('active');
  const idx = Object.keys(map).indexOf(tab);
  document.querySelectorAll('.admin-tab')[idx].classList.add('active');
  if (tab === 'view')  renderAdminSidebar();
  if (tab === 'users') renderUsersTable();
}

// ── NOTIF ─────────────────────────────────────────────────────
let notifTimer = null;
function showNotif(msg, type='') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className   = 'notif show ' + type;
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.className = 'notif'; }, 2200);
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── KEYBOARD ──────────────────────────────────────────────────
document.getElementById('loginName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginPass').focus();
});
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── INIT ──────────────────────────────────────────────────────
showPage('loginPage');
</script>
</body>
</html>
