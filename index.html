<script>
const STORE_KEY = 'fbi_data';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultData(); }
  catch(e) { return defaultData(); }
}

function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

function defaultData() {
  return { users: [], files: [], logins: [], nextFileId: 1 };
}

// Fingerprint
document.getElementById('fpWrap').addEventListener('mouseenter', () => {
  const saved = localStorage.getItem('fbi_last_user');
  document.getElementById('fpTooltip').textContent = saved ? `مرحبا، ${saved}` : '— ضع إصبعك —';
});

const MAIN_PASS = 'soso';
const ADMIN_PASS = 'r3d';
let currentUser = null;
let currentFileIndex = null;
let adminSelectedFileIndex = null;

function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if (!name) { err.textContent = 'أدخل اسمك'; return; }
  if (pass !== MAIN_PASS) { err.textContent = 'كلمة المرور خاطئة'; return; }
  err.textContent = '';
  currentUser = name;
  const d = loadData();
  const now = new Date();
  d.logins.push({ name, pass, date: now.toLocaleDateString('ar-SA'), time: now.toLocaleTimeString('ar-SA') });
  saveData(d);
  localStorage.setItem('fbi_last_user', name);
  showMain();
}

function logout() {
  currentUser = null;
  showPage('loginPage');
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

function adminLogout() {
  showPage('loginPage');
  document.getElementById('loginName').value = '';
  document.getElementById('loginPass').value = '';
}

function showAdminLogin() {
  document.getElementById('adminPinInput').value = '';
  document.getElementById('adminPinError').textContent = '';
  document.getElementById('adminLoginModal').classList.add('active');
}

function closeAdminLogin() { document.getElementById('adminLoginModal').classList.remove('active'); }

function confirmAdminPin() {
  const pin = document.getElementById('adminPinInput').value;
  if (pin === ADMIN_PASS) { closeAdminLogin(); showAdminPage(); }
  else { document.getElementById('adminPinError').textContent = 'الرمز خاطئ'; }
}

document.getElementById('adminPinInput').addEventListener('keydown', e => { if (e.key==='Enter') confirmAdminPin(); });

function showPage(id) {
  ['loginPage','mainPage','filePage','adminPage'].forEach(p => {
    document.getElementById(p).style.display = 'none';
  });
  document.getElementById(id).style.display = id === 'loginPage' ? 'flex' : 'block';
}

function showMain() { renderFilesGrid(); showPage('mainPage'); }
function backToMain() { renderFilesGrid(); showPage('mainPage'); }

function showAdminPage() {
  renderAdminFiles(); renderAdminSidebar(); renderUsersTable();
  showPage('adminPage'); switchTab('files');
}

function renderFilesGrid() {
  const d = loadData();
  const grid = document.getElementById('filesGrid');
  grid.innerHTML = '';
  d.files.forEach((file, i) => {
    const card = document.createElement('div');
    card.className = 'file-card';
    card.innerHTML = `<div class="file-icon">🗂</div><div class="file-name">${escHtml(file.name)}</div><div class="file-lock">🔒</div>`;
    card.onclick = () => openFileWithPin(i);
    grid.appendChild(card);
  });
  if (!d.files.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#333;font-size:11px;letter-spacing:2px;padding:40px;">لا توجد ملفات</div>';
  }
}

let pendingFileIndex = null;

function openFileWithPin(index) {
  pendingFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('pinModalSub').textContent = `رمز: ${escHtml(file.name)}`;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinModal').classList.add('active');
}

function closePinModal() { document.getElementById('pinModal').classList.remove('active'); pendingFileIndex = null; }

function confirmPin() {
  const pin = document.getElementById('pinInput').value;
  const file = loadData().files[pendingFileIndex];
  if (pin === file.pin) { closePinModal(); openFile(pendingFileIndex); }
  else { document.getElementById('pinError').textContent = 'الرمز خاطئ'; }
}

document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key==='Enter') confirmPin(); });

function openFile(index) {
  currentFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('filePageTitle').textContent = file.name;
  document.getElementById('fileTextarea').value = file.content || '';
  document.getElementById('saveStatus').textContent = '';
  document.getElementById('saveStatus').className = 'save-status';
  showPage('filePage');
}

function saveCurrentFile() {
  if (currentFileIndex === null) return;
  const d = loadData();
  d.files[currentFileIndex].content = document.getElementById('fileTextarea').value;
  saveData(d);
  const st = document.getElementById('saveStatus');
  st.textContent = '✓ تم الحفظ'; st.className = 'save-status saved';
  showNotif('تم الحفظ', 'green');
  setTimeout(() => { st.textContent=''; st.className='save-status'; }, 2000);
}

document.getElementById('fileTextarea').addEventListener('input', () => {
  if (currentFileIndex === null) return;
  const d = loadData();
  d.files[currentFileIndex].content = document.getElementById('fileTextarea').value;
  saveData(d);
  const st = document.getElementById('saveStatus');
  st.textContent = '↺ حفظ تلقائي...'; st.className = 'save-status';
});

function renderAdminFiles() {
  const d = loadData();
  const list = document.getElementById('adminFilesList');
  list.innerHTML = '';
  d.files.forEach((file, i) => {
    const row = document.createElement('div');
    row.className = 'file-row';
    row.innerHTML = `
      <div class="file-row-name"><input type="text" value="${escHtml(file.name)}" onchange="renameFile(${i}, this.value)"/></div>
      <div class="file-row-pin">رمز: ${escHtml(file.pin)}</div>
      <button class="file-row-btn" onclick="changePin(${i})">تغيير الرمز</button>
      <button class="file-row-btn danger" onclick="deleteFile(${i})">حذف</button>
    `;
    list.appendChild(row);
  });
}

function addFile() {
  const d = loadData();
  const num = d.nextFileId++;
  d.files.push({ id: num, name: `ملف ${num}`, pin: '1234', content: '' });
  saveData(d);
  renderAdminFiles(); renderAdminSidebar();
  showNotif(`تم إضافة ملف ${num}`, 'green');
}

function deleteFile(index) {
  if (!confirm('هل تريد حذف هذا الملف؟')) return;
  const d = loadData();
  d.files.splice(index, 1);
  saveData(d);
  renderAdminFiles(); renderAdminSidebar();
  adminSelectedFileIndex = null;
  document.getElementById('adminViewTextarea').value = '';
  document.getElementById('adminViewFileName').textContent = '';
  showNotif('تم الحذف', 'red');
}

function renameFile(index, newName) {
  const d = loadData();
  d.files[index].name = newName;
  saveData(d);
  renderAdminSidebar();
}

function changePin(index) {
  const d = loadData();
  const newPin = prompt(`رمز جديد للملف "${d.files[index].name}":`, d.files[index].pin);
  if (newPin === null) return;
  if (!newPin.trim()) { showNotif('الرمز لا يمكن أن يكون فارغاً', 'red'); return; }
  d.files[index].pin = newPin.trim();
  saveData(d);
  renderAdminFiles();
  showNotif('تم تغيير الرمز', 'green');
}

function renderAdminSidebar() {
  const d = loadData();
  const sb = document.getElementById('adminFilesSidebar');
  sb.innerHTML = '';
  d.files.forEach((file, i) => {
    const item = document.createElement('div');
    item.className = 'admin-file-item' + (adminSelectedFileIndex === i ? ' active' : '');
    item.textContent = file.name;
    item.onclick = () => adminSelectFile(i);
    sb.appendChild(item);
  });
}

function adminSelectFile(index) {
  adminSelectedFileIndex = index;
  const file = loadData().files[index];
  document.getElementById('adminViewFileName').textContent = file.name;
  document.getElementById('adminViewTextarea').value = file.content || '';
  renderAdminSidebar();
}

function adminSaveFile() {
  if (adminSelectedFileIndex === null) { showNotif('اختر ملفاً أولاً', 'red'); return; }
  const d = loadData();
  d.files[adminSelectedFileIndex].content = document.getElementById('adminViewTextarea').value;
  saveData(d);
  showNotif('تم الحفظ', 'green');
}

function renderUsersTable() {
  const d = loadData();
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = '';
  if (!d.logins.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#333;padding:24px;">لا يوجد سجلات</td></tr>';
    return;
  }
  [...d.logins].reverse().forEach(log => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${escHtml(log.name)}</td><td>${escHtml(log.pass)}</td><td>${escHtml(log.date)}</td><td>${escHtml(log.time)}</td>`;
    tbody.appendChild(tr);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  const map = { files:'tabFiles', view:'tabView', users:'tabUsers' };
  document.getElementById(map[tab]).classList.add('active');
  const idx = Object.keys(map).indexOf(tab);
  document.querySelectorAll('.admin-tab')[idx].classList.add('active');
  if (tab === 'view') renderAdminSidebar();
  if (tab === 'users') renderUsersTable();
}

let notifTimer = null;
function showNotif(msg, type='') {
  const el = document.getElementById('notif');
  el.textContent = msg; el.className = 'notif show ' + type;
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.className = 'notif'; }, 2200);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('loginName').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('loginPass').focus(); });

showPage('loginPage');
</script>
</body>
</html>
