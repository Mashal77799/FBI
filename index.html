<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Panel</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:gray;
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    font-size:50px;
    letter-spacing:10px;
    color:gray;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:5px;
    background:#111;
    border:1px solid gray;
    color:white;
}

button{
    padding:10px;
    background:#222;
    border:1px solid gray;
    color:gray;
    cursor:pointer;
}

/* APP */
#app{display:none;}

.header{
    text-align:center;
    font-size:26px;
    margin-top:20px;
    border-bottom:1px solid gray;
    width:80%;
    margin:auto;
    padding-bottom:10px;
}

.files{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    width:90%;
    margin:30px auto;
}

.file{
    border:1px solid gray;
    padding:20px;
    text-align:center;
    cursor:pointer;
}

.editor{
    width:80%;
    margin:auto;
    display:none;
}

textarea{
    width:100%;
    height:250px;
    background:#111;
    color:white;
    border:1px solid gray;
    font-size:16px;
}

.admin{
    width:80%;
    margin:20px auto;
    border:1px solid gray;
    padding:10px;
    display:none;
}

.small{
    font-size:12px;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="logo">SYSTEM</div>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="small" onclick="adminLogin()">القيادات</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">Dashboard</div>

<div class="files" id="files"></div>

<div class="editor" id="editor">
    <h3 id="title"></h3>
    <textarea id="text"></textarea>
    <br><br>
    <button onclick="save()">حفظ</button>
</div>

<div class="admin" id="admin">
    <h3>Admin Panel</h3>
    <button onclick="addFile()">إضافة ملف</button>
    <button onclick="deleteFile()">حذف ملف</button>
    <button onclick="renameFile()">تغيير اسم ملف</button>
    <hr>
    <h4>المستخدمين</h4>
    <div id="users"></div>
</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")||"[]");
let files = JSON.parse(localStorage.getItem("files")||"[]");

let currentUser = null;
let currentFile = null;

/* LOGIN */
function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(!u || !p) return alert("اكتب البيانات");

    let found = users.find(x=>x.user===u && x.pass===p);

    if(!found){
        found = {user:u,pass:p,role:"user"};
        users.push(found);
        localStorage.setItem("users",JSON.stringify(users));
    }

    currentUser = found;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    if(files.length===0){
        for(let i=1;i<=10;i++){
            files.push({name:"File "+i,content:""});
        }
        localStorage.setItem("files",JSON.stringify(files));
    }

    render();
}

/* ADMIN LOGIN */
function adminLogin(){
    let p = prompt("Password");
    if(p==="r3d"){
        currentUser = {role:"admin"};
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("admin").style.display="block";
        renderUsers();
        render();
    }else{
        alert("Wrong");
    }
}

/* RENDER FILES */
function render(){
    let box = document.getElementById("files");
    box.innerHTML="";

    files.forEach((f,i)=>{
        let div=document.createElement("div");
        div.className="file";
        div.innerText=f.name;
        div.onclick=()=>openFile(i);
        box.appendChild(div);
    });
}

function openFile(i){
    currentFile=i;
    document.getElementById("editor").style.display="block";
    document.getElementById("title").innerText=files[i].name;
    document.getElementById("text").value=files[i].content;
}

function save(){
    files[currentFile].content=document.getElementById("text").value;
    localStorage.setItem("files",JSON.stringify(files));
}

/* ADMIN FEATURES */
function addFile(){
    files.push({name:"New File",content:""});
    localStorage.setItem("files",JSON.stringify(files));
    render();
}

function deleteFile(){
    files.pop();
    localStorage.setItem("files",JSON.stringify(files));
    render();
}

function renameFile(){
    let n = prompt("New name");
    if(n){
        files[currentFile].name=n;
        localStorage.setItem("files",JSON.stringify(files));
        render();
    }
}

function renderUsers(){
    let box=document.getElementById("users");
    box.innerHTML="";
    users.forEach(u=>{
        let d=document.createElement("div");
        d.innerText=u.user+" ("+u.role+")";
        box.appendChild(d);
    });
}

</script>

</body>
</html>
